sentence=Bluetooth Low Energy (BLE) HID keyboard library for ESP32 using NimBLE-Arduino 2.3.8+
paragraph=Full 104/105-key coverage including numpad, consumer/media keys, international and language keys. Unified API — keyboard and media keys share the same press(), release(), and tap() calls. 3-level debug logging. Tested on iOS, iPadOS and Android. Requires NimBLE-Arduino >= 2.3.8 and ESP32 Arduino Core >= 3.3.7.
