; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.partitions = partitions/default_16MB.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
build_flags = 
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM=1
	-Wno-deprecated-declarations
	-DUSB_PRODUCT="\"ki-board\""
	-DUSB_MANUFACTURER="\"Kiro\""
build_src_filter = +<main.cpp> +<agent_registry.cpp> +<display_hardware.cpp> +<hid_actions.cpp> +<ui_render.cpp> +<kiro_expr_idle.cpp> +<kiro_expr_wait.cpp> +<kiro_expr_work.cpp> +<kiro_expr_table.cpp>
lib_deps = 
	moononournation/GFX Library for Arduino@^1.5.0
	bblanchon/ArduinoJson@^7.0.4
lib_ignore = 
	HijelHID_BLEKeyboard
	AsyncTCP_RP2040W
	ESPAsyncTCP

; Same firmware, for boards where physical Key1 and Key3 are swapped by soldering.
[env:esp32-s3-swap-key1-key3]
extends = env:esp32-s3
build_flags =
	${env:esp32-s3.build_flags}
	-DKIRO_HW_SWAP_KEY1_KEY3=1

; Hardware test: round LCD ghost icon
[env:test-round-lcd]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM=1
	-Wno-deprecated-declarations
build_src_filter = +<../test/test_round_lcd.cpp> +<kiro_logo.cpp>
lib_deps = 
	moononournation/GFX Library for Arduino@^1.5.0
lib_ignore =
	HijelHID_BLEKeyboard
