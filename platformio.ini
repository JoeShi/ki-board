; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.partitions = partitions/default_16MB.csv
board_build.filesystem = littlefs
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM=0
	-DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
	-DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
	-Wno-deprecated-declarations
lib_deps = 
	; JSON 解析
	bblanchon/ArduinoJson@^7.3.0
	; 屏幕驱动 (兼容 ESP32-C6)
	moononournation/GFX Library for Arduino@^1.5.0
	; BLE HID 键盘依赖的 NimBLE (Registry可装)
	h2zero/NimBLE-Arduino@^2.3.8
	; Web 配置 (ESP32Async 维护的现代版本, 支持 Arduino Core 3.x)
	esp32async/ESPAsyncWebServer@^3.7.0
	esp32async/AsyncTCP@^3.3.0
	; 注: HijelHID_BLEKeyboard 和 RotaryEncoderPCNT 已手动下载到 lib/ 目录
	; (GitHub git clone 网络超时, 改用 codeload.github.com 下载zip)
lib_ignore = 
	AsyncTCP_RP2040W
	ESPAsyncTCP
platform_packages = espressif/toolchain-riscv32-esp@12.2.0+20230208
