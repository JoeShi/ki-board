; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/cu.usbmodem5B901609521
board_build.flash_size = 16MB
board_build.partitions = partitions/default_16MB.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
build_flags = 
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM=1
	-Wno-deprecated-declarations
build_src_filter = +<main.cpp> +<kiro_expr_idle.cpp> +<kiro_expr_wait.cpp> +<kiro_expr_work.cpp> +<kiro_expr_table.cpp>
lib_deps = 
	moononournation/GFX Library for Arduino@^1.5.0
lib_ignore = 
	HijelHID_BLEKeyboard
	RotaryEncoderPCNT
	AsyncTCP_RP2040W
	ESPAsyncTCP

; Hardware test: round LCD ghost icon
[env:test-round-lcd]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM=1
	-Wno-deprecated-declarations
build_src_filter = +<../test/test_round_lcd.cpp>
lib_deps = 
	moononournation/GFX Library for Arduino@^1.5.0
lib_ignore =
	HijelHID_BLEKeyboard
	RotaryEncoderPCNT
